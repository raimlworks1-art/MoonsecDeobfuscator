name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0'
      - run: dotnet build -c Release
      - uses: actions/upload-artifact@v3
        with:
          name: MoonsecDeobfuscator
          path: bin/Release/
